<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gerenciamento de Tarefas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #667eea;
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .header p {
            color: #666;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            background: #10b981;
            color: white;
            margin-top: 10px;
        }

        /* Form */
        .form-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Botões */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
        }

        /* Cards */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
        }

        .tarefas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .tarefa-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            animation: fadeIn 0.5s ease-in;
        }

        .tarefa-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tarefa-titulo {
            font-size: 1.2rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .tarefa-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .status-PENDENTE { background: #fef3c7; color: #d97706; }
        .status-EM_ANDAMENTO { background: #dbeafe; color: #2563eb; }
        .status-CONCLUIDO { background: #d1fae5; color: #059669; }
        .status-CANCELADO { background: #fee2e2; color: #dc2626; }

        .tarefa-descricao {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .tarefa-observacoes {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 15px;
            padding: 10px;
            background: #f9fafb;
            border-radius: 8px;
        }

        .tarefa-datas {
            font-size: 0.7rem;
            color: #999;
            margin-bottom: 15px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }

        .tarefa-acoes {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Sistema de Gerenciamento de Tarefas</h1>
            <p>API RESTful com Spring Boot + PostgreSQL</p>
            <div class="status-badge" id="apiStatus">Verificando API...</div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalTarefas">0</div>
                <div class="stat-label">Total de Tarefas</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="tarefasPendentes">0</div>
                <div class="stat-label">Pendentes</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="tarefasConcluidas">0</div>
                <div class="stat-label">Concluídas</div>
            </div>
        </div>

        <div class="form-container">
            <h2 id="formTitle">➕ Nova Tarefa</h2>
            <form id="tarefaForm">
                <input type="hidden" id="tarefaId">
                <div class="form-group">
                    <label for="nome">Nome da Tarefa *</label>
                    <input type="text" id="nome" required minlength="3" maxlength="100" placeholder="Digite o nome da tarefa">
                </div>
                <div class="form-group">
                    <label for="descricao">Descrição</label>
                    <textarea id="descricao" placeholder="Descreva a tarefa..."></textarea>
                </div>
                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status">
                        <option value="PENDENTE">⏳ Pendente</option>
                        <option value="EM_ANDAMENTO">🔄 Em Andamento</option>
                        <option value="CONCLUIDO">✅ Concluído</option>
                        <option value="CANCELADO">❌ Cancelado</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="observacoes">Observações</label>
                    <textarea id="observacoes" placeholder="Observações adicionais..."></textarea>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="limparForm()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">💾 Salvar Tarefa</button>
                </div>
            </form>
        </div>

        <div id="tarefasContainer" class="tarefas-grid"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/api/tarefas';
        const HEALTH_URL = 'http://localhost:8080/api/health';

        // Verificar status da API
       async function checkApiStatus() {
    try {
        // Tenta primeiro o health check
        const response = await fetch(`${API_URL.replace('/tarefas', '')}/health`);
        
        if (response.ok) {
            const data = await response.json();
            document.getElementById('apiStatus').innerHTML = '✅ API Online - ' + (data.database || 'PostgreSQL Conectado');
            document.getElementById('apiStatus').style.background = '#10b981';
            document.getElementById('apiStatus').style.color = 'white';
        } else {
            throw new Error('Health check falhou');
        }
    } catch (error) {
        console.error('Health check error:', error);
        // Se health check falhar, tenta acessar as tarefas
        try {
            const tarefasResponse = await fetch(API_URL);
            if (tarefasResponse.ok) {
                document.getElementById('apiStatus').innerHTML = '✅ API Online - PostgreSQL Conectado';
                document.getElementById('apiStatus').style.background = '#10b981';
                document.getElementById('apiStatus').style.color = 'white';
            } else {
                throw new Error('API não responde');
            }
        } catch (tarefasError) {
            document.getElementById('apiStatus').innerHTML = '❌ API Offline - Verifique se o backend está rodando na porta 8080';
            document.getElementById('apiStatus').style.background = '#ef4444';
            document.getElementById('apiStatus').style.color = 'white';
        }
    }
}
        // Carregar tarefas
        async function carregarTarefas() {
            try {
                const response = await fetch(API_URL);
                const tarefas = await response.json();
                exibirTarefas(tarefas);
                atualizarStats(tarefas);
            } catch (error) {
                console.error('Erro ao carregar tarefas:', error);
                document.getElementById('tarefasContainer').innerHTML = 
                    '<div class="loading">❌ Erro ao conectar com o backend. Verifique se o Spring Boot está rodando.</div>';
            }
        }

        function atualizarStats(tarefas) {
            document.getElementById('totalTarefas').textContent = tarefas.length;
            document.getElementById('tarefasPendentes').textContent = 
                tarefas.filter(t => t.status === 'PENDENTE' || t.status === 'EM_ANDAMENTO').length;
            document.getElementById('tarefasConcluidas').textContent = 
                tarefas.filter(t => t.status === 'CONCLUIDO').length;
        }

        function exibirTarefas(tarefas) {
            const container = document.getElementById('tarefasContainer');
            
            if (tarefas.length === 0) {
                container.innerHTML = '<div class="loading">📭 Nenhuma tarefa cadastrada. Crie sua primeira tarefa!</div>';
                return;
            }

            container.innerHTML = tarefas.map(tarefa => `
                <div class="tarefa-card">
                    <div class="tarefa-titulo">📌 ${escapeHtml(tarefa.nome)}</div>
                    <div class="tarefa-status status-${tarefa.status}">
                        ${getStatusTexto(tarefa.status)}
                    </div>
                    ${tarefa.descricao ? `<div class="tarefa-descricao">📄 ${escapeHtml(tarefa.descricao)}</div>` : ''}
                    ${tarefa.observacoes ? `<div class="tarefa-observacoes">💬 ${escapeHtml(tarefa.observacoes)}</div>` : ''}
                    <div class="tarefa-datas">
                        🕐 Criado: ${formatarData(tarefa.dataCriacao)}<br>
                        ✏️ Atualizado: ${formatarData(tarefa.dataAtualizacao)}
                    </div>
                    <div class="tarefa-acoes">
                        <button class="btn btn-warning btn-sm" onclick="editarTarefa(${tarefa.id})">✏️ Editar</button>
                        <button class="btn btn-danger btn-sm" onclick="deletarTarefa(${tarefa.id})">🗑️ Excluir</button>
                    </div>
                </div>
            `).join('');
        }

        async function salvarTarefa(event) {
            event.preventDefault();
            
            const id = document.getElementById('tarefaId').value;
            const tarefa = {
                nome: document.getElementById('nome').value,
                descricao: document.getElementById('descricao').value,
                status: document.getElementById('status').value,
                observacoes: document.getElementById('observacoes').value
            };

            try {
                let response;
                if (id) {
                    response = await fetch(`${API_URL}/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(tarefa)
                    });
                    if (response.ok) showToast('✅ Tarefa atualizada com sucesso!');
                } else {
                    response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(tarefa)
                    });
                    if (response.ok) showToast('✅ Tarefa criada com sucesso!');
                }

                if (response.ok) {
                    limparForm();
                    carregarTarefas();
                } else {
                    const error = await response.text();
                    showToast('❌ Erro: ' + error, 'error');
                }
            } catch (error) {
                console.error('Erro ao salvar tarefa:', error);
                showToast('❌ Erro ao conectar com o servidor', 'error');
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = type === 'success' ? '#10b981' : '#ef4444';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ... resto das funções (editarTarefa, deletarTarefa, limparForm, etc)
        async function editarTarefa(id) {
            try {
                const response = await fetch(`${API_URL}/${id}`);
                const tarefa = await response.json();
                
                document.getElementById('tarefaId').value = tarefa.id;
                document.getElementById('nome').value = tarefa.nome;
                document.getElementById('descricao').value = tarefa.descricao || '';
                document.getElementById('status').value = tarefa.status;
                document.getElementById('observacoes').value = tarefa.observacoes || '';
                
                document.getElementById('formTitle').textContent = '✏️ Editar Tarefa';
                document.querySelector('.form-container').scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                showToast('❌ Erro ao carregar tarefa', 'error');
            }
        }

        async function deletarTarefa(id) {
            if (confirm('⚠️ Tem certeza que deseja excluir esta tarefa?')) {
                try {
                    const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    if (response.ok) {
                        showToast('🗑️ Tarefa excluída com sucesso!');
                        carregarTarefas();
                    } else {
                        showToast('❌ Erro ao excluir tarefa', 'error');
                    }
                } catch (error) {
                    showToast('❌ Erro ao conectar com o servidor', 'error');
                }
            }
        }

        function limparForm() {
            document.getElementById('tarefaForm').reset();
            document.getElementById('tarefaId').value = '';
            document.getElementById('formTitle').textContent = '➕ Nova Tarefa';
        }

        function getStatusTexto(status) {
            const statusMap = {
                'PENDENTE': '⏳ Pendente',
                'EM_ANDAMENTO': '🔄 Em Andamento',
                'CONCLUIDO': '✅ Concluído',
                'CANCELADO': '❌ Cancelado'
            };
            return statusMap[status] || status;
        }

        function formatarData(dataString) {
            if (!dataString) return 'N/A';
            const data = new Date(dataString);
            return data.toLocaleString('pt-BR');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            checkApiStatus();
            carregarTarefas();
            document.getElementById('tarefaForm').addEventListener('submit', salvarTarefa);
            setInterval(checkApiStatus, 30000); // Verificar a cada 30 segundos
        });
    </script>
</body>
</html>
